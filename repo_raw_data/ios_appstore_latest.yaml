      \ issue where the ConnectionSetting parameter was not taken in consideration\
      \ in MDM environments\n\u2022Fixed an issue where browser shortcuts appeared\
      \ when users scanned a value.\n\u2022Improved he diagnostic file collection\
      \ flow. Users can now save share or save in a local folder, useful for kiosk\
      \ mode situations.\n\u2022Fixed an issue where, on the Movement flow\u2019s\
      \ Confirm page, users could not scan the license plate, only the last character\
      \ of the barcode was shown.\n\u2022Fixed a visual issue where Work List tile\
      \ headers were not parsed correctly when containing special characters.\n\u2022\
      Fixed an issue in the Movement flow where the previous value was shown in the\
      \ step banner on the wrong step."
