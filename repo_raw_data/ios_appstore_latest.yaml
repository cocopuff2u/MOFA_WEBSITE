    minimumOsVersion: '15.0'
    releaseNotes: '- Media controls for background tabs -

      If a tab is playing audio in a background tab, the user will be able to mute/unmute
      the tab from the search or tab bar, by long pressing the tab icon, or from inside
      the Tabs overview. In order to find the playing tab, there is an animation on
      the tab inside the Tab view and a pulse on the tab icon. There is also a mute/unmute
      icon in the search bar. Finally, if a tab is muted and you want to unmute it
      quickly, you can just press the device volume up/down buttons.


      - Improved Sync and Backup -

      Bookmarks, Tabs and Passwords will sync quicker both ways.

      Improved status info in Account and Sync settings

      Added onboarding for sync and backup and easy account sign in/up


      - Bug fixes and UI improvements -

      File and image upload in search for AI queries

      New languages (Estonian, Malay (Malaysia), Burmese, Burmese (Zawgyi), Sinhala,
      Slovenian, Swahili, Tamil and Tagalog/Filipino)

      Hot fix: Crash fixes x 4 (in 6.6.1)'
